
{% extends 'base.html' %}{% load static %}
{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/settings.css' %}">
{% endblock %}
{% block title %}Settings - AutoPro Elite{% endblock %}
{% block content %}
  <div class="wrap">
    <div class="card">
      <div class="head"><div class="title"><i class="fas fa-gear"></i> Settings</div></div>
      <div class="body">
        <div class="grid">
          <div class="form-group">
            <label>Username</label>
            <input id="username" placeholder="Enter new username" />
          </div>
          <div class="form-group">
            <label>Current Avatar</label>
            <div style="display:flex;align-items:center;gap:12px">
              <img id="avatar_img" class="avatar" src="" alt="Avatar" style="display:none"/>
              <span class="muted" id="avatar_hint">No avatar uploaded</span>
            </div>
          </div>
        </div>
        <div class="form-group" style="max-width:360px;margin-top:10px">
          <label>Upload New Avatar</label>
          <div class="uploader"><input id="avatar_file" type="file" accept="image/*" /></div>
        </div>
        <div class="actions">
          <button id="saveBtn" class="btn btn-primary"><i class="fas fa-save"></i> Save Settings</button>
          <a href="/account/" class="btn btn-outline"><i class="fas fa-user"></i> Back to Account</a>
        </div>
        <div id="msg" class="muted" style="margin-top:8px"></div>
      </div>
    </div>
  </div>
{% block extra_js %}
  <script src="{% static 'js/settings.js' %}"></script>
{% endblock %}{% endblock %}
