server {
    listen 80;
    # Replace the following with your EC2 Public IP or Domain Name
    server_name YOUR_EC2_PUBLIC_IP_OR_DOMAIN;

    location = /favicon.ico { access_log off; log_not_found off; }
    
    # Serve Static Files directly through NGINX
    location /static/ {
        alias /home/ubuntu/AutoProElite/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Serve Media Files (Images, etc) directly through NGINX
    location /media/ {
        alias /home/ubuntu/AutoProElite/backend/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Pass all other traffic to Gunicorn
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
        
        # Note: If frontend is on a different domain, Nginx CORS headers can be configured here if Django-cors-headers is not used.
        # However, Django is already handling CORS via django-cors-headers.
    }

    # To enable HTTPS, run: sudo certbot --nginx -d YOUR_DOMAIN
}
